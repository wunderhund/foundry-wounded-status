name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create module ZIP
        run: |
          zip -r craigs-wounded-status-${{ steps.get_version.outputs.version }}.zip \
            module.json \
            scripts/ \
            icons/ \
            LICENSE \
            README.md

      - name: Upload ZIP to release
        run: |
          gh release upload v${{ steps.get_version.outputs.version }} \
            craigs-wounded-status-${{ steps.get_version.outputs.version }}.zip \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
